<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Gateway | System Bypass</title>
    <style>
        body { background-color: #050505; color: #bc13fe; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; }
        .nav { background: #11011a; padding: 12px; border-bottom: 2px solid #bc13fe; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; box-shadow: 0 0 20px rgba(188, 19, 254, 0.4); }
        input { background: #000; border: 1px solid #bc13fe; color: #00ff00; padding: 10px; width: 30%; border-radius: 5px; outline: none; font-size: 14px; }
        button { background: #bc13fe; color: white; border: none; padding: 10px 18px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; text-transform: uppercase; font-size: 12px; }
        button:hover { background: white; color: #bc13fe; box-shadow: 0 0 15px #bc13fe; }
        .btn-alt { background: #333; color: #ccc; }
        .exit-btn { background: #444; color: #fff; font-size: 10px; }
        .exit-btn:hover { background: #ff0000; }
        #frame-container { height: calc(100vh - 85px); width: 100%; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        .status-bar { font-size: 11px; color: #666; width: 100%; text-align: center; margin-top: 5px; }
        .dot { height: 7px; width: 7px; background-color: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="nav">
        <strong onclick="goToBase()" style="cursor:pointer; letter-spacing: 1px;"> [ SHADOW_GATEWAY_V4 ] </strong>
        
        <input type="text" id="urlInput" placeholder="Enter URL (e.g. tiktok.com)">
        
        <button onclick="launch('google')">Tunnel 1 (Fast)</button>
        <button class="btn-alt" onclick="launch('proxy')">Tunnel 2 (Bypass)</button>
        <button class="btn-alt" onclick="launch('archive')">Archive Mode</button>
        <button class="exit-btn" onclick="goToBase()">EXIT [ESC]</button>
        
        <div class="status-bar">
            <span class="dot"></span> ENCRYPTION ACTIVE | <span style="color:#888">Tip: If TikTok refuses Tunnel 1, try Tunnel 2.</span>
        </div>
    </div>

    <div id="frame-container">
        <iframe id="proxyFrame" src="about:blank"></iframe>
    </div>

    <script>
        function launch(type) {
            let target = document.getElementById('urlInput').value.trim();
            if (!target) return alert("Please enter a URL!");

            target = target.replace('https://', '').replace('http://', '');
            let frame = document.getElementById('proxyFrame');
            let finalUrl = "";

            if (type === 'google') {
                finalUrl = "https://translate.google.com/translate?sl=en&tl=en&u=https://" + target;
            } 
            else if (type === 'proxy') {
                finalUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://" + target);
            }
            else if (type === 'archive') {
                finalUrl = "https://web.archive.org/web/2/https://" + target;
            }

            frame.src = finalUrl;
        }

        function goToBase() {
            window.location.href = "https://dannekz.github.io/DD1_JR/";
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') goToBase();
            if (e.key === 'Enter') launch('google');
        });
    </script>
</body>
</html>
