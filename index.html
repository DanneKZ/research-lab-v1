<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Gateway | Internal Access</title>
    <style>
        body { background-color: #050505; color: #bc13fe; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; }
        .nav { background: #11011a; padding: 10px; border-bottom: 2px solid #bc13fe; display: flex; align-items: center; justify-content: center; gap: 10px; }
        input { background: #000; border: 1px solid #bc13fe; color: #00ff00; padding: 10px; width: 40%; border-radius: 5px; outline: none; }
        button { background: #bc13fe; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        button:hover { background: white; color: #bc13fe; }
        .exit-btn { background: #444; font-size: 11px; }
        /* This is the magic container */
        #content-viewer { width: 100%; height: calc(100vh - 70px); background: white; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="nav">
        <strong onclick="location.href='https://dannekz.github.io/DD1_JR/'" style="cursor:pointer">[SHADOW_GATEWAY]</strong>
        <input type="text" id="urlInput" placeholder="Type site (e.g. tiktok.com)">
        <button onclick="internalLaunch()">FETCH CONTENT</button>
        <button class="exit-btn" onclick="location.href='https://dannekz.github.io/DD1_JR/'">EXIT [ESC]</button>
    </div>

    <div id="content-viewer">
        <iframe id="gatewayFrame" src="about:blank"></iframe>
    </div>

    <script>
        function internalLaunch() {
            let target = document.getElementById('urlInput').value.trim();
            if (!target) return alert("Enter a URL first!");

            // Clean the URL
            target = target.replace('https://', '').replace('http://', '');

            // Using a specialized "CORS Anywhere" layer combined with Google's rendering engine
            // This forces the content to stay inside your iFrame
            let proxyUrl = "https://translate.google.com/translate?sl=auto&tl=en&u=https://" + target;

            document.getElementById('gatewayFrame').src = proxyUrl;
        }

        // Fast escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') location.href = 'https://dannekz.github.io/DD1_JR/';
            if (e.key === 'Enter') internalLaunch();
        });
    </script>
    <script>
    // عند تحميل الصفحة، ابحث إذا كان هناك رابط محفوظ سابقاً
    window.onload = function() {
        let savedUrl = localStorage.getItem('lastShadowUrl');
        if (savedUrl) {
            document.getElementById('urlInput').value = savedUrl;
            // اختياري: فتحه تلقائياً
            // internalLaunch(); 
        }
    }

    function internalLaunch() {
        let target = document.getElementById('urlInput').value.trim();
        if (!target) return alert("Enter a URL!");

        // حفظ الرابط في ذاكرة المتصفح للمرة القادمة
        localStorage.setItem('lastShadowUrl', target);

        target = target.replace('https://', '').replace('http://', '');
        let proxyUrl = "https://translate.google.com/translate?sl=auto&tl=en&u=https://" + target;

        document.getElementById('gatewayFrame').src = proxyUrl;
    }
</script>
</body>
</html>
