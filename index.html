<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Gateway | Stealth Mode</title>
    <style>
        body { background-color: #0d0211; color: #bc13fe; font-family: 'Courier New', Courier, monospace; text-align: center; margin: 0; overflow: hidden; }
        .nav { background: #1a0225; padding: 10px; border-bottom: 2px solid #bc13fe; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        input { background: #000; border: 1px solid #bc13fe; color: #00ff00; padding: 8px; width: 40%; border-radius: 5px; outline: none; }
        button { background: #bc13fe; color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 5px; box-shadow: 0 0 10px #bc13fe; }
        button:hover { background: white; color: #bc13fe; }
        .exit-btn { background: transparent; border: 1px solid #444; color: #888; font-size: 11px; box-shadow: none; }
        .exit-btn:hover { background: #ff0000; color: white; border-color: red; }
        #frame-container { height: calc(100vh - 70px); width: 100%; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
        .status { font-size: 11px; color: #888; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="nav">
        <strong style="cursor:pointer" onclick="goToBase()">[ SHADOW GATEWAY ]</strong>
        <input type="text" id="urlInput" placeholder="Enter URL (e.g. tiktok.com)">
        <button onclick="launch()">OPEN TUNNEL</button>
        <button class="exit-btn" onclick="goToBase()">RETURN TO BASE [ESC]</button>
        <div class="status">Status: <span style="color: #00ff00;">ENCRYPTED & STEALTH ACTIVE</span></div>
    </div>

    <div id="frame-container">
        <iframe id="proxyFrame" src="about:blank"></iframe>
    </div>

    <script>
        // وظيفة تشغيل البروكسي
        function launch() {
            let target = document.getElementById('urlInput').value;
            if (!target) return alert("Enter URL!");
            
            // إضافة البروتوكول تلقائياً إذا نسيه المستخدم
            if (!target.startsWith('http')) {
                target = 'https://' + target;
            }

            // محرك البروكسي (استخدمنا AllOrigins لأنه يدعم فك شفرات أكثر)
            const proxyEngine = "https://api.allorigins.win/raw?url="; 
            
            let frame = document.getElementById('proxyFrame');
            frame.src = proxyEngine + encodeURIComponent(target);
        }

        // وظيفة العودة للموقع الرسمي
        function goToBase() {
            window.location.href = "https://dannekz.github.io/DD1_JR/";
        }

        // تفعيل زر الـ ESC للهروب السريع
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                goToBase();
            }
        });

        // السماح بالضغط على Enter في خانة الإدخال لتشغيل البروكسي
        document.getElementById('urlInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                launch();
            }
        });
    </script>
</body>
</html>
