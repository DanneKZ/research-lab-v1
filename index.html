<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Gateway | System Bypass</title>
    <style>
        body { background-color: #050505; color: #bc13fe; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .container { background: #11011a; padding: 40px; border-radius: 15px; border: 2px solid #bc13fe; box-shadow: 0 0 30px rgba(188, 19, 254, 0.5); text-align: center; width: 80%; max-width: 600px; }
        h1 { letter-spacing: 5px; font-size: 24px; margin-bottom: 20px; text-transform: uppercase; }
        input { background: #000; border: 1px solid #bc13fe; color: #00ff00; padding: 15px; width: 80%; border-radius: 5px; outline: none; font-size: 16px; margin-bottom: 20px; text-align: center; }
        .button-group { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        button { background: #bc13fe; color: white; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: white; color: #bc13fe; box-shadow: 0 0 20px #bc13fe; transform: scale(1.05); }
        .btn-startpage { background: #ffbd00; color: #000; }
        .btn-exit { background: #444; margin-top: 20px; font-size: 12px; }
        .status { margin-top: 20px; font-size: 11px; color: #666; }
        .dot { height: 8px; width: 8px; background-color: #00ff00; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>SHADOW_LAUNCHER</h1>
        <input type="text" id="urlInput" placeholder="Enter Site (e.g. tiktok.com)">
        
        <div class="button-group">
            <button onclick="launchCroxy()">Launch via CroxyProxy</button>
            
            <button class="btn-startpage" onclick="launchStartpage()">Startpage Search</button>
        </div>

        <button class="btn-exit" onclick="location.href='https://dannekz.github.io/DD1_JR/'">Emergency Exit [ESC]</button>
        
        <div class="status">
            <span class="dot"></span> SYSTEM READY | BYPASS ENABLED
        </div>
    </div>

    <script>
        function launchCroxy() {
            let target = document.getElementById('urlInput').value.trim();
            if (!target) target = "tiktok.com"; // إذا لم يكتب شيئاً يفتح تيك توك تلقائياً
            
            // هذه الوصلة السحرية التي ترسل الرابط لـ CroxyProxy مباشرة
            let finalUrl = "https://www.croxyproxy.com/_proxy/open?url=" + encodeURIComponent("https://" + target);
            window.open(finalUrl, '_blank'); // يفتح في نافذة جديدة لتجنب الحظر
        }

        function launchStartpage() {
            let target = document.getElementById('urlInput').value.trim();
            let finalUrl = "https://www.startpage.com/do/search?q=" + encodeURIComponent(target);
            window.open(finalUrl, '_blank');
        }

        // الهروب السريع
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') location.href = 'https://dannekz.github.io/DD1_JR/';
            if (e.key === 'Enter') launchCroxy();
        });
    </script>

</body>
</html>
